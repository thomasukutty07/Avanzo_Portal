<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avanzo | Internal Dashboard</title>
    <meta
      name="description"
      content="Avanzo Cyber Security Solutions - Internal Workspace Dashboard"
    />

    <!--
      ════════════════════════════════════════════════════════════════
      SECURITY HEADERS (meta-tag equivalents)
      Note: The Django backend also sets these as HTTP response headers
      via core.security_middleware.SecurityHeadersMiddleware.
      These meta tags provide a second layer for environments where the
      backend headers may be stripped (e.g. CDN edge caches).
      ════════════════════════════════════════════════════════════════
    -->

    <!-- Content-Security-Policy: Prevent XSS by whitelisting resource origins -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com data:;
        img-src 'self' data: blob:;
        connect-src 'self';
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
        object-src 'none';
        upgrade-insecure-requests;
      "
    />

    <!-- Prevent MIME-type sniffing (supplementary to X-Content-Type-Options header) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!-- Prevent this page from being embedded in any frame (anti-clickjacking) -->
    <meta http-equiv="X-Frame-Options" content="DENY" />

    <!-- Referrer: Only send origin on same-site; no referrer on cross-origin -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Disable cache for the HTML shell (API responses are separately no-store) -->
    <meta http-equiv="Cache-Control" content="no-store" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Public+Sans:wght@300;400;500;600;700;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <meta name="theme-color" content="#ffffff" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
