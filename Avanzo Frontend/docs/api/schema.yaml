          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEmployee'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEmployee'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
          description: ''
    delete:
      operationId: auth_employees_destroy
      description: |-
        ViewSet for viewing and editing employee instances.
        Restricted to Admin and HR via custom permissions.
      parameters:
      - in: path
        name: id
        schema:
