    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        project:
          type: string
          format: uuid
        project_name:
          type: string
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
