      - created_by
      - created_by_name
      - description
      - id
      - resolution_note
      - resolved_at
      - resolved_by
      - resolved_by_name
      - status
      - status_display
      - task_snapshot
      - ticket_type
      - ticket_type_display
      - title
    TicketCreate:
      type: object
      description: |-
        Write serializer — used when an employee files a new ticket.

        The employee only provides ticket_type, title, description.
        Everything else (created_by, assigned_to, task_snapshot) is
        set automatically by the view.
      properties:
        ticket_type:
          $ref: '#/components/schemas/TicketTypeEnum'
        title:
          type: string
          maxLength: 500
        description:
          type: string
      required:
      - description
      - ticket_type
      - title
    TicketResolve:
      type: object
      description: Used when someone resolves a ticket. resolution_note is mandatory.
      properties:
        resolution_note:
          type: string
          description: Explain how the issue was resolved.
          minLength: 10
      required:
      - resolution_note
    TicketStatusEnum:
      enum:
