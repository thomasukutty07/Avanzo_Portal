openapi: 3.0.3
info:
  title: Avanzo Dashboard API
  version: 0.1.0
  description: Internal company dashboard REST API
paths:
  /api/admin/velocity/:
    get:
      operationId: admin_velocity_retrieve
      description: Returns "Tasks Completed per Hours Logged" over the last 12 weeks,
        broken down by department.
      summary: Get Velocity Metrics
      parameters:
      - in: query
        name: department_id
        schema:
          type: string
          format: uuid
        description: Filter by department UUID
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/attendance/:
    get:
      operationId: attendance_list
      description: |-
        Attendance Triad API.

        Employees:
          GET  /api/attendance/          → personal attendance history
          GET  /api/attendance/{id}/     → single day detail
          POST /api/attendance/clock-in/ → morning gate (structured entries)
          PATCH /api/attendance/clock-out/ → evening gate (update entries)
          GET  /api/attendance/today/    → today's record

        Team Leads:
          GET  /api/attendance/team-feed/ → today's intent feed for direct reports

        Admins:
          GET  /api/attendance/pulse/    → org-wide attendance status
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - attendance
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDailyLogList'
          description: ''
  /api/attendance/{id}/:
    get:
      operationId: attendance_retrieve
      description: |-
        Attendance Triad API.

        Employees:
          GET  /api/attendance/          → personal attendance history
          GET  /api/attendance/{id}/     → single day detail
          POST /api/attendance/clock-in/ → morning gate (structured entries)
          PATCH /api/attendance/clock-out/ → evening gate (update entries)
          GET  /api/attendance/today/    → today's record

        Team Leads:
          GET  /api/attendance/team-feed/ → today's intent feed for direct reports

        Admins:
          GET  /api/attendance/pulse/    → org-wide attendance status
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this daily log.
        required: true
      tags:
      - attendance
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyLog'
          description: ''
  /api/attendance/clock-in/:
    post:
      operationId: attendance_clock_in_create
      description: |-
        POST /api/attendance/clock-in/

        Morning Gate — the employee must submit structured work items
        before they can start their day.

        Payload:
        {
            "entries": [
                {"project": "uuid", "intent_text": "Finish auth PR"},
                {"project": "uuid", "intent_text": "Start task modal"},
                {"custom_label": "Code Reviews", "intent_text": "Review 3 PRs"}
            ],
            "general_notes": "Team standup at 10am"
        }
      tags:
      - attendance
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DailyLog'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DailyLog'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DailyLog'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyLog'
          description: ''
  /api/attendance/clock-out/:
    patch:
      operationId: attendance_clock_out_partial_update
      description: |-
        PATCH /api/attendance/clock-out/

        Evening Gate — the employee updates each morning entry with what
        actually happened and a completion outcome.

        Payload:
        {
            "entries": [
                {
                    "entry_id": "uuid",
                    "output_text": "Finished the auth middleware PR",
                    "outcome": "completed"
                },
                {
                    "entry_id": "uuid",
                    "output_text": "Reviewed 2 of 3 PRs",
                    "outcome": "partial"
                }
            ],
            "general_notes": "Updated sprint board"
        }
      tags:
      - attendance
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedDailyLog'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedDailyLog'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedDailyLog'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyLog'
          description: ''
  /api/attendance/pulse/:
    get:
      operationId: attendance_pulse_retrieve
      description: |-
        GET /api/attendance/pulse/?department_id=uuid

        The CEO's morning view — org-wide attendance status at a glance.
        Color-coded: green (on-time), yellow (late), red (missing).
      tags:
      - attendance
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyLog'
          description: ''
  /api/attendance/reports/:
    get:
      operationId: attendance_reports_retrieve
      description: |-
        GET /api/attendance/reports/

        Generates an attendance report for a date range.

        Query Parameters:
            from_date (required): Start date, e.g., 2026-01-01
            to_date (required): End date, e.g., 2026-03-30
            department_id (optional): Filter by department UUID
            employee_id (optional): Filter to a single employee
            format (optional): "csv" for downloadable CSV, default is JSON

        Access: HR and Admin only.

        Example:
            GET /api/attendance/reports/?from_date=2026-03-01&to_date=2026-03-30
            GET /api/attendance/reports/?from_date=2026-03-01&to_date=2026-03-30&department_id=uuid
            GET /api/attendance/reports/?from_date=2026-03-01&to_date=2026-03-30&format=csv
      summary: Generate Attendance Report
      parameters:
      - in: query
        name: department_id
        schema:
          type: string
          format: uuid
      - in: query
        name: employee_id
        schema:
          type: string
          format: uuid
      - in: query
        name: format
        schema:
          type: string
          enum:
          - csv
          - json
        description: Output format
      - in: query
        name: from_date
        schema:
          type: string
          format: date
        required: true
      - in: query
        name: to_date
        schema:
          type: string
          format: date
        required: true
      tags:
      - attendance
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/attendance/team-feed/:
    get:
      operationId: attendance_team_feed_retrieve
      description: |-
        GET /api/attendance/team-feed/

        The TL's morning view — shows today's attendance and intent
        for every direct report. The TL can see at 9:30 AM who is
        working on what, who is late, and who hasn't shown up.
      tags:
      - attendance
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyLog'
          description: ''
  /api/attendance/today/:
    get:
      operationId: attendance_today_retrieve
      description: |-
        GET /api/attendance/today/

        Returns today's attendance record with all entries.
        If no record exists yet, returns a fresh empty one so the
        frontend can render the clock-in form.
      tags:
      - attendance
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyLog'
          description: ''
  /api/auth/employees/:
    get:
      operationId: auth_employees_list
      description: |-
        ViewSet for viewing and editing employee instances.
        Restricted to Admin and HR via custom permissions.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
