components:
  schemas:
    AccessRole:
      type: object
      description: Used for populating dropdowns and UI selection.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          $ref: '#/components/schemas/NameEnum'
        description:
          type: string
      required:
      - id
      - name
    Broadcast:
      type: object
      description: Used for displaying broadcasts to employees.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        severity:
          allOf:
          - $ref: '#/components/schemas/SeverityEnum'
          readOnly: true
        target_scope:
          allOf:
          - $ref: '#/components/schemas/TargetScopeEnum'
          readOnly: true
        department:
          type: string
          format: uuid
          readOnly: true
          nullable: true
          description: Only required if target_scope is 'department'.
        department_name:
          type: string
          readOnly: true
        title:
          type: string
          readOnly: true
        message:
          type: string
          readOnly: true
        created_by:
          type: string
          format: uuid
          readOnly: true
        created_by_name:
          type: string
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
          description: Uncheck to manually hide this broadcast.
        is_acknowledged:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - created_by
      - created_by_name
      - department
      - department_name
      - id
      - is_acknowledged
      - is_active
      - message
      - severity
      - target_scope
      - title
    BroadcastCreate:
      type: object
      description: Used by Admin/HR to create a new broadcast.
      properties:
        severity:
          $ref: '#/components/schemas/SeverityEnum'
        target_scope:
          $ref: '#/components/schemas/TargetScopeEnum'
        department:
          type: string
          format: uuid
          nullable: true
          description: Only required if target_scope is 'department'.
        title:
          type: string
          maxLength: 255
        message:
          type: string
      required:
      - message
      - title
    CustomTokenObtainPair:
      type: object
      description: |-
        Embeds user role and profile data into the JWT so the frontend
        can hydrate RoleContext immediately after login without a second API call.
      properties:
        email:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    DailyLog:
      type: object
      description: |-
        Read-only serializer for the full daily attendance record.
        Nests the structured project entries so the frontend gets
        everything in a single API call.

        Example response:
        {
            "id": "uuid",
            "date": "2026-03-30",
            "status": "clocked_in",
            "clock_in_time": "2026-03-30T09:00:00Z",
            "is_late": false,
            "general_notes": "Team standup at 10am",
            "entries": [
                {
                    "project": "uuid",
                    "project_name": "Avanzo Dashboard",
                    "intent_text": "Finish the auth middleware PR",
                    "output_text": "",
                    "outcome": "",
                },
                {
                    "project": null,
                    "custom_label": "Code Reviews",
                    "intent_text": "Review 3 pending PRs from the team",
                    "output_text": "",
                    "outcome": "",
                }
            ]
        }
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        employee:
          type: string
          format: uuid
          readOnly: true
        employee_name:
          type: string
          readOnly: true
        date:
          type: string
          format: date
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/DailyLogStatusEnum'
          readOnly: true
        status_display:
          type: string
          readOnly: true
        clock_in_time:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        clock_out_time:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        is_late:
          type: boolean
          readOnly: true
          description: Auto-set to True if clock-in is after the org's threshold.
        total_hours:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          readOnly: true
          nullable: true
          description: Hours worked, computed at clock-out.
        general_notes:
          type: string
          readOnly: true
          description: Optional free-text for non-project activities like meetings,
            training, etc.
        entries:
          type: array
          items:
            $ref: '#/components/schemas/DailyLogEntryRead'
          readOnly: true
        has_clocked_in:
          type: boolean
          readOnly: true
        has_clocked_out:
          type: boolean
          readOnly: true
      required:
      - clock_in_time
      - clock_out_time
      - date
      - employee
      - employee_name
      - entries
      - general_notes
      - has_clocked_in
      - has_clocked_out
      - id
      - is_late
      - status
      - status_display
      - total_hours
    DailyLogEntryRead:
      type: object
      description: |-
        Read-only serializer for a single project work entry.
        The frontend uses this to render structured intent/output cards.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        project:
          type: string
          format: uuid
          readOnly: true
          nullable: true
          description: The project this work item is about. Leave blank for general/misc
            work.
        project_name:
          type: string
          readOnly: true
        custom_label:
          type: string
          readOnly: true
          description: Used when no project is selected. E.g., 'Team Meetings', 'Code
            Review'.
        display_label:
          type: string
          readOnly: true
        intent_text:
          type: string
          readOnly: true
          description: What the employee plans to accomplish on this project today.
        output_text:
          type: string
          readOnly: true
          description: What was actually accomplished. Filled during clock-out.
        outcome:
          allOf:
          - $ref: '#/components/schemas/OutcomeEnum'
          readOnly: true
          description: |-
            How did this work item end up? Set during clock-out.

            * `completed` - Completed as planned
            * `partial` - Partially completed
            * `blocked` - Blocked by dependency
            * `carried_over` - Carried over to tomorrow
            * `not_started` - Not started
        outcome_display:
          type: string
          readOnly: true
          default: ''
        has_output:
          type: boolean
          readOnly: true
        priority_order:
          type: integer
          readOnly: true
          description: Display order. Lower number = higher priority.
      required:
      - custom_label
      - display_label
      - has_output
      - id
      - intent_text
      - outcome
      - outcome_display
      - output_text
      - priority_order
      - project
      - project_name
    DailyLogStatusEnum:
      enum:
      - pending
      - clocked_in
      - clocked_out
      - missing
      type: string
      description: |-
        * `pending` - Pending
        * `clocked_in` - Clocked In
        * `clocked_out` - Clocked Out
        * `missing` - Missing
    Department:
      type: object
