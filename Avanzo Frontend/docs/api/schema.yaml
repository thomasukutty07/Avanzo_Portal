    PatchedDailyLog:
      type: object
      description: |-
        Read-only serializer for the full daily attendance record.
        Nests the structured project entries so the frontend gets
        everything in a single API call.

        Example response:
        {
            "id": "uuid",
            "date": "2026-03-30",
            "status": "clocked_in",
            "clock_in_time": "2026-03-30T09:00:00Z",
            "is_late": false,
            "general_notes": "Team standup at 10am",
            "entries": [
                {
                    "project": "uuid",
                    "project_name": "Avanzo Dashboard",
                    "intent_text": "Finish the auth middleware PR",
                    "output_text": "",
                    "outcome": "",
                },
                {
                    "project": null,
                    "custom_label": "Code Reviews",
                    "intent_text": "Review 3 pending PRs from the team",
                    "output_text": "",
                    "outcome": "",
                }
            ]
        }
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        employee:
          type: string
          format: uuid
          readOnly: true
        employee_name:
          type: string
          readOnly: true
        date:
          type: string
          format: date
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/DailyLogStatusEnum'
          readOnly: true
        status_display:
          type: string
          readOnly: true
        clock_in_time:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        clock_out_time:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        is_late:
          type: boolean
          readOnly: true
          description: Auto-set to True if clock-in is after the org's threshold.
        total_hours:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          readOnly: true
          nullable: true
          description: Hours worked, computed at clock-out.
        general_notes:
          type: string
          readOnly: true
          description: Optional free-text for non-project activities like meetings,
            training, etc.
        entries:
          type: array
          items:
            $ref: '#/components/schemas/DailyLogEntryRead'
          readOnly: true
        has_clocked_in:
          type: boolean
          readOnly: true
        has_clocked_out:
          type: boolean
          readOnly: true
