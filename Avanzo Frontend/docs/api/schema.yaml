          description: ''
    post:
      operationId: auth_employees_create
      description: |-
        ViewSet for viewing and editing employee instances.
        Restricted to Admin and HR via custom permissions.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Employee'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Employee'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Employee'
        required: true
      security:
      - jwtAuth: []
